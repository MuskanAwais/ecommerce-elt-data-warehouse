
# Name your project! Project names should be lowercase and use underscores as spaces
name: 'ecommerce_elt'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'ecommerce_elt'

# These configurations specify where dbt should look for different types of files.
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

models:
  ecommerce_elt:
    +schema: dbt

    # Staging models - raw data transformations
    staging:
      materialized: view
      
    # Dimension models - business entities
    dim:
      materialized: table
      
    # Fact models - events/transactions
    fact:
      materialized: table
      
    # Mart models - business-level aggregations
    marts:
      materialized: table
      
    # Metrics models
    analytics:
      materialized: table

# Seed configurations
seeds:
  ecommerce_elt:
    +quote_columns: false

# Variable defaults
vars:
  'start_date': '2026-01-01'
  'end_date': '2026-12-31'
