
# Name your project! Project names should be lowercase and use underscores as spaces
name: 'ecommerce_elt'
version: '1.0.0'
config-version: 2

# This setting configures which "profile" dbt uses for this project.
profile: 'ecommerce_elt'

# These configurations specify where dbt should look for different types of files.
# The `source-paths` says "look in the models subdirectory for the dbt project"
# You may customize these paths for your organization's needs.
model-paths: ["models"]
analysis-paths: ["analysis"]
test-paths: ["tests"]
data-paths: ["data"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"  # directory which will store compiled SQL files
clean-paths:         # directories to be removed by `dbt clean`
  - "target"
  - "dbt_packages"

# Configuring models
# Full documentation: https://docs.getdbt.com/docs/configuring-models

# In this example config, we tell dbt to build all models in the models directory
# as tables. These settings can be overridden in the individual model files
# using the `{{ config(...) }}` macro.
models:
  ecommerce_elt:
    # Staging models - raw data transformations
    staging:
      materialized: view
      schema: staging
    
    # Mart models - business-level aggregations
    marts:
      materialized: table
      schema: marts
      
    # Metrics models
    metrics:
      materialized: table
      schema: analytics

# Seed configurations
# Using CSV files to populate reference data
seeds:
  ecommerce_elt:
    +quote_columns: false
    +schema: seeds

# Variable defaults (can be overridden at run time)
vars:
  'start_date': '2026-01-01'
  'end_date': '2026-12-31'
